<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Convert images to PDF online. Drag & drop multiple images.">
<meta name="keywords" content="image to pdf, convert images to pdf, online pdf converter">
<title>Image to PDF - ToolHub</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Image to PDF</h1>
    <p>Upload images and convert them into a single PDF file quickly.</p>
</header>

<div class="container upload-section">
    <input type="file" id="uploadImagesPDF" multiple accept="image/*">
    <button onclick="convertImagesToPDF()">Convert & Download</button>
</div>

<a href="index.html" class="btn">Back to Home</a>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
async function convertImagesToPDF() {
    const { jsPDF } = window.jspdf;
    const files = document.getElementById('uploadImagesPDF').files;
    if(!files.length) { alert('Upload images'); return; }
    const pdf = new jsPDF();
    for(let i=0;i<files.length;i++){
        const img = new Image();
        img.src = URL.createObjectURL(files[i]);
        await new Promise(res => { img.onload=res; });
        const ratio = img.width/img.height;
        const width = pdf.internal.pageSize.getWidth();
        const height = width/ratio;
        if(i!==0) pdf.addPage();
        pdf.addImage(img,'JPEG',0,0,width,height);
    }
    pdf.save('images.pdf');
}
</script>

</body>
</html>
