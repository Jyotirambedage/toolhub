<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Compress your images online for free. Reduce file size without losing quality.">
<meta name="keywords" content="image compressor, compress png, compress jpg, online image compression">
<title>Image Compressor - ToolHub</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Image Compressor</h1>
    <p>Upload your image and compress it without losing quality. Drag & drop or browse files.</p>
</header>

<div class="container upload-section">
    <input type="file" id="uploadImage" accept="image/*">
    <div class="slider-container">
        <label for="qualityRange">Quality:</label>
        <input type="range" id="qualityRange" min="10" max="100" value="80">
        <span id="qualityValue">80%</span>
    </div>
    <button onclick="compressImage()">Compress & Download</button>
    <img id="preview" src="#" alt="" style="display:none;">
</div>

<a href="index.html" class="btn">Back to Home</a>

<script>
const uploadImage = document.getElementById('uploadImage');
const preview = document.getElementById('preview');
const qualityRange = document.getElementById('qualityRange');
const qualityValue = document.getElementById('qualityValue');

qualityRange.addEventListener('input', () => {
    qualityValue.textContent = qualityRange.value + '%';
});

uploadImage.addEventListener('change', () => {
    const file = uploadImage.files[0];
    if(file) {
        preview.src = URL.createObjectURL(file);
        preview.style.display = 'block';
    }
});

function compressImage() {
    const file = uploadImage.files[0];
    if(!file) { alert('Please upload an image'); return; }
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    const img = new Image();
    img.onload = () => {
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.drawImage(img,0,0);
        canvas.toBlob((blob) => {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'compressed_' + file.name;
            a.click();
        }, 'image/jpeg', qualityRange.value/100);
    };
    img.src = URL.createObjectURL(file);
}
</script>

</body>
</html>
