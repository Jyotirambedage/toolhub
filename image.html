<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="description" content="Compress images online with high, medium, low quality.">
<meta name="keywords" content="image compressor, png compressor, jpg compressor">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Compressor</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>Image Compressor</header>
<div class="upload-section">
    <div class="drag-drop" id="drag-drop">Drag & Drop or Click to Upload</div>
    <input type="file" id="file-input" accept="image/*">
    <label>Quality: <input type="range" id="quality" min="10" max="100" value="80"></label>
    <div class="preview"><img id="preview-img" style="display:none;"></div>
    <button id="compress-btn">Compress Image</button>
    <div class="result-box" id="result-box"></div>
</div>
<script src="js/compressor.js"></script>
</body>
</html>
