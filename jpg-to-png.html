<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="description" content="Convert JPG images to PNG online.">
<meta name="keywords" content="jpg to png, convert jpg, image converter">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JPG to PNG</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>JPG → PNG Converter</header>
<div class="upload-section">
    <div class="drag-drop" id="drag-drop">Drag & Drop JPG or Click</div>
    <input type="file" id="file-input" accept="image/jpeg">
    <div class="preview"><img id="preview-img" style="display:none;"></div>
    <button id="convert-btn">Convert to PNG</button>
</div>
<script src="js/jpg-to-png.js"></script>
</body>
</html>
