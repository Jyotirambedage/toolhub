<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="description" content="Convert PNG images to JPG online.">
<meta name="keywords" content="png to jpg, convert png, image converter">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PNG to JPG</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>PNG → JPG Converter</header>
<div class="upload-section">
    <div class="drag-drop" id="drag-drop">Drag & Drop PNG or Click</div>
    <input type="file" id="file-input" accept="image/png">
    <div class="preview"><img id="preview-img" style="display:none;"></div>
    <button id="convert-btn">Convert to JPG</button>
</div>
<script src="js/png-to-jpg.js"></script>
</body>
</html>
