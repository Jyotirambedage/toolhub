<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="description" content="Resize images online with width & height inputs.">
<meta name="keywords" content="image resizer, resize png, resize jpg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Resizer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>Image Resizer</header>
<div class="upload-section">
    <div class="drag-drop" id="drag-drop">Drag & Drop or Click to Upload</div>
    <input type="file" id="file-input" accept="image/*">
    <label>Width: <input type="number" id="width" placeholder="px"></label>
    <label>Height: <input type="number" id="height" placeholder="px"></label>
    <div class="preview"><img id="preview-img" style="display:none;"></div>
    <button id="resize-btn">Resize Image</button>
    <div class="result-box" id="result-box"></div>
</div>
<script src="js/resizer.js"></script>
</body>
</html>
