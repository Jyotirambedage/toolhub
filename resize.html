<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Resize Image Online - ToolHub</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <header>
      <h1>📏 Image Resize Tool</h1>
      <p>Resize image by width, height or reduce file size</p>
    </header>

    <div style="text-align: center">
      <a href="index.html" class="back-btn">⬅ Back to Home</a>
    </div>

    <div class="container">
      <input type="file" id="upload" /><br /><br />

      <label>Width:</label>
      <input type="number" id="width" placeholder="e.g. 800" /><br /><br />

      <label>Height:</label>
      <input type="number" id="height" placeholder="e.g. 600" /><br /><br />

      <button onclick="resize()">Resize Image</button>

      <p id="sizes"></p>

      <canvas id="canvas"></canvas><br /><br />

      <a id="downloadBtn" style="display: none">
        <button>Download</button>
      </a>
    </div>

    <footer>
      <p>Resize images instantly • Free tool</p>
    </footer>

    <script src="resize.js"></script>
  </body>
</html>
